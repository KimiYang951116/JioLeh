name: Auto Request Reviewer

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  request-reviewer:
    name: Request paired reviewer
    runs-on: ubuntu-latest

    steps:
      - name: Request reviewer based on PR author
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            --method POST \
            "repos/$REPO/issues/$PR_NUMBER/assignees" \
            -f "assignees[]=$AUTHOR"

          if [ "$AUTHOR" = "KimiYang951116" ]; then
            gh api \
              --method POST \
              "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              -f "reviewers[]=justhehippo"
          elif [ "$AUTHOR" = "justhehippo" ]; then
            gh api \
              --method POST \
              "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              -f "reviewers[]=KimiYang951116"
          fi
